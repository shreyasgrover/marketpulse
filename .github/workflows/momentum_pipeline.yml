name: MomentumOS Data Refresh (Daily)

on:
  schedule:
    # 22:00 UTC = 6pm ET summer / 5pm ET winter — after close, after Scanners run
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write   # needed to commit momentum_data.json back

concurrency:
  group: momentum-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # pipeline takes ~15-30 min for ~1500 stocks
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python momentum_pipeline.py

      - name: Commit fresh momentum_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add momentum_data.json
          git diff --cached --quiet || git commit -m "Refresh momentum data $(date -u +%F) [skip ci]"
          git push
